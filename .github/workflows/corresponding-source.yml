name: Corresponding Source Bundle

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
      - name: Resolve and validate the coordinated version
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"
          if [[ "$GITHUB_REF" == refs/tags/* && "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $version" >&2
            exit 1
          fi
      - run: npm run source:bundle
      - name: Verify the finished archive independently
        run: node toolchain/verify-corresponding-source.mjs "dist/n8n-nodes-ytdlp-${PACKAGE_VERSION}-sources.tar.gz" "$PACKAGE_VERSION"
      - uses: actions/upload-artifact@v4
        with:
          name: corresponding-source-${{ env.PACKAGE_VERSION }}
          path: dist/n8n-nodes-ytdlp-${{ env.PACKAGE_VERSION }}-sources.tar.gz
          if-no-files-found: error
      - name: Attach the immutable source bundle to the tagged release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" --verify-tag --title "${{ github.ref_name }}" --generate-notes
          gh release upload "${{ github.ref_name }}" \
            "dist/n8n-nodes-ytdlp-${PACKAGE_VERSION}-sources.tar.gz"
