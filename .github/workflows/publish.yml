name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        default: v0.1.0
      ci_run_id:
        description: Successful CI run containing the package artifacts
        required: true

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Validate the release and CI run
        env:
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          DISPATCH_REF: ${{ github.ref }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ "$DISPATCH_REF" != "refs/tags/$TAG" ]]; then
            echo "Dispatch this workflow from the $TAG tag."
            exit 1
          fi

          tag_commit="$(git rev-parse HEAD)"
          ci_status="$(gh run view "$CI_RUN_ID" --json status --jq .status)"
          ci_conclusion="$(gh run view "$CI_RUN_ID" --json conclusion --jq .conclusion)"
          ci_commit="$(gh run view "$CI_RUN_ID" --json headSha --jq .headSha)"

          test "$ci_status" = "completed"
          test "$ci_conclusion" = "success"
          test "$ci_commit" = "$tag_commit"

          source_asset="$(gh release view "$TAG" --json assets --jq \
            '.assets[] | select(.name == "n8n-nodes-ytdlp-0.1.0-sources.tar.gz") | .name')"
          test "$source_asset" = "n8n-nodes-ytdlp-0.1.0-sources.tar.gz"

      - uses: actions/download-artifact@v5
        with:
          name: n8n-nodes-yt-dlp-linux-x64
          path: release/x64
          repository: ${{ github.repository }}
          run-id: ${{ inputs.ci_run_id }}
          github-token: ${{ github.token }}

      - uses: actions/download-artifact@v5
        with:
          name: n8n-nodes-yt-dlp-linux-arm64
          path: release/arm64
          repository: ${{ github.repository }}
          run-id: ${{ inputs.ci_run_id }}
          github-token: ${{ github.token }}

      - uses: actions/download-artifact@v5
        with:
          name: node-package
          path: release/node
          repository: ${{ github.repository }}
          run-id: ${{ inputs.ci_run_id }}
          github-token: ${{ github.token }}

      - name: Use a trusted-publishing capable npm CLI
        run: npm install --global npm@11.18.0

      - name: Inspect package archives
        run: |
          npm publish release/x64/n8n-nodes-yt-dlp-linux-x64-0.1.0.tgz --tag next --access public --dry-run
          npm publish release/arm64/n8n-nodes-yt-dlp-linux-arm64-0.1.0.tgz --tag next --access public --dry-run
          npm publish release/node/n8n-nodes-yt-dlp-0.1.0.tgz --tag next --access public --dry-run

      - name: Publish platform packages
        run: |
          npm publish release/x64/n8n-nodes-yt-dlp-linux-x64-0.1.0.tgz --tag next --access public
          npm publish release/arm64/n8n-nodes-yt-dlp-linux-arm64-0.1.0.tgz --tag next --access public

      - name: Publish the n8n community node
        run: npm publish release/node/n8n-nodes-yt-dlp-0.1.0.tgz --tag next --access public
